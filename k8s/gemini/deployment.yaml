apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini
  namespace: bot-discord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemini
  template:
    metadata:
      labels:
        app: gemini
    spec:
      serviceAccountName: gemini-sa
      containers:
        - name: gemini
          image: europe-west1-docker.pkg.dev/bot-discord-493608/bot-discord/gemini:latest
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT_ID
              value: bot-discord-493608
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
